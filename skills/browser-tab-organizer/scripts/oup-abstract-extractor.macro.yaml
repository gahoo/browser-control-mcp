name: "oup-abstract-extractor"
steps:
  - name: "Focus"
    tool: "switch-to-tab"
    params:
      tabId: "{{input.tabId}}"

  - name: "Wait for Page Load"
    tool: "is-tab-loaded"
    params:
      tabId: "{{input.tabId}}"
    retry:
      until: "{{output}} === true"
      maxRetries: 10
      interval: 2000

  - builtin: "delay"
    params: { ms: 3000 }

  - name: "Identify Access & Content Level"
    tool: "execute-script"
    params:
      tabId: "{{input.tabId}}"
      script: |
        (function() {
          const bodyText = document.body.innerText;
          const pdfLink = document.querySelector('.article-pdf-link, .download-pdf, a[href*="/article-pdf/"]');
          if (pdfLink) return "FULL_TEXT";
          const hasFullSections = /Introduction\n|Results\n|Methods\n|Discussion\n/i.test(bodyText);
          if (hasFullSections) return "FULL_TEXT";
          const hasPurchase = !!document.querySelector('.purchase-reg-box, .purchase-article, .at-article-purchase-options');
          if (hasPurchase) return "ABSTRACT_ONLY";
          return "UNKNOWN";
        })()
    output: "access_level"

  - name: "Capture Abstract Content"
    tool: "get-tab-markdown-content"
    params:
      tabId: "{{input.tabId}}"
      cssSelector: ".abstract, #abstract, section[data-sb-object-type='abstract']"
      # 不使用 dump，直接返回内容
    onError: "stop"
